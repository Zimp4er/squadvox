worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream signaling {
        server signaling:3000;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name squadvox.ru www.squadvox.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name squadvox.ru www.squadvox.ru;

        ssl_certificate     /etc/letsencrypt/live/squadvox.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/squadvox.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Proxy all traffic to Node.js (HTTP + WebSocket upgrade)
        location / {
            proxy_pass         http://signaling;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
        }
    }
}
